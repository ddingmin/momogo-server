services:
  app:
    image: "ghcr.io/nexters/momogo-server:${IMAGE_TAG:?IMAGE_TAG is required}"
    pull_policy: always
    restart: unless-stopped
    init: true
    stop_grace_period: 30s

    ports:
      - "${APP_BIND_ADDRESS:-127.0.0.1}:${APP_PORT:-8080}:8080"

    environment:
      SPRING_PROFILES_ACTIVE: "${DEPLOY_ENV:?DEPLOY_ENV is required}"
      SPRING_CONFIG_IMPORT: configtree:/run/secrets/
      SPRING_DATASOURCE_URL: "${DB_URL:?DB_URL is required}"
      SPRING_DATASOURCE_USERNAME: "${DB_USERNAME:?DB_USERNAME is required}"

    secrets:
      - source: db_password
        target: spring.datasource.password
      - source: jwt_secret
        target: momogo.security.jwt-secret

    security_opt:
      - no-new-privileges:true

secrets:
  # File-backed secrets must be readable by the container's UID/GID 1000:1000.
  db_password:
    file: "/etc/momogo/${DEPLOY_ENV:?DEPLOY_ENV is required}/secrets/db-password"
  jwt_secret:
    file: "/etc/momogo/${DEPLOY_ENV:?DEPLOY_ENV is required}/secrets/jwt-secret"

name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Publish test results
        id: test_report
        uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: 테스트 결과
          path: build/test-results/test/*.xml
          reporter: java-junit
          fail-on-empty: true

      - name: Comment test results on pull request
        uses: marocchino/sticky-pull-request-comment@v3
        if: ${{ !cancelled() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        with:
          header: test-results
          message: |
            ## 🧪 테스트 결과

            | 성공 | 실패 | 스킵 |
            | ---: | ---: | ---: |
            | ${{ steps.test_report.outputs.passed }} | ${{ steps.test_report.outputs.failed }} | ${{ steps.test_report.outputs.skipped }} |

            [상세 테스트 결과 보기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: test-reports
          path: |
            build/reports/tests/test
            build/test-results/test
          if-no-files-found: warn
          retention-days: 7

  publish-image:
    name: Publish image
    needs: test
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/cd.yml
    with:
      target: ${{ github.ref_name == 'main' && 'main' || 'production' }}
      revision: ${{ github.sha }}
      ref_name: ${{ github.ref_name }}
    secrets:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
